<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KDrama Uploader</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080810;--card:#0f0f1a;--border:#1e1e32;--a:#6366f1;--a2:#a855f7;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--text2:#64748b}
body{background:var(--bg);font-family:'Space Grotesk',sans-serif;color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(99,102,241,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* Layout */
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:340px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:20px}
.main{flex:1;overflow-y:auto;padding:20px}

/* Header */
.header{margin-bottom:20px}
h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,#a5b4fc,#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--text2);font-size:12px;margin-top:2px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}

/* Fields */
.field{margin-bottom:10px}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;padding:9px 12px;background:#070710;border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:13px}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--a)}
.field textarea{resize:vertical;min-height:60px}
.row{display:flex;gap:8px}.row .field{flex:1}

/* File drop */
.file-drop{border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:.2s;font-size:12px;color:var(--text2)}
.file-drop:hover,.file-drop.over{border-color:var(--a);background:rgba(99,102,241,0.04)}
.file-drop input{display:none}
.file-name{color:var(--green);margin-top:5px;font-size:12px;font-weight:600}

/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.toggle-row span{font-size:13px;color:var(--text2)}
.toggle{width:40px;height:22px;background:#1e1e32;border-radius:99px;position:relative;cursor:pointer;border:none;transition:.2s}
.toggle.on{background:var(--a)}
.toggle::after{content:'';width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:.2s}
.toggle.on::after{left:21px}

/* Buttons */
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;margin-top:6px}
.btn-primary{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:600}
.btn-red{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.btn-yellow{background:rgba(245,158,11,0.15);color:var(--yellow);border:1px solid rgba(245,158,11,0.3)}

/* Queue */
.queue-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.queue-title{font-size:16px;font-weight:700}
.queue-count{background:var(--a);color:#fff;border-radius:99px;padding:2px 10px;font-size:12px;font-weight:700}
.task-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.2s}
.task-card:hover{border-color:var(--a)}
.task-card.active{border-color:var(--a);background:#0d0d1f}
.task-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.task-title{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{padding:3px 8px;border-radius:99px;font-size:11px;font-weight:700}
.badge.pending{background:rgba(100,116,139,0.2);color:var(--text2)}
.badge.processing{background:rgba(99,102,241,0.2);color:#a5b4fc}
.badge.done{background:rgba(34,197,94,0.2);color:var(--green)}
.badge.error{background:rgba(239,68,68,0.2);color:var(--red)}
.task-bar-bg{height:3px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:8px}
.task-bar{height:100%;background:linear-gradient(90deg,var(--a),var(--a2));border-radius:99px;transition:width .4s}
.task-meta{font-size:11px;color:var(--text2)}
.task-actions{display:flex;gap:6px;margin-top:8px}

/* Log */
.log-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;height:calc(100vh - 80px);display:flex;flex-direction:column}
.log-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.log-title{font-size:14px;font-weight:700}
.log-sub{font-size:11px;color:var(--text2)}
.log-box{flex:1;overflow-y:auto;padding:12px;font-family:monospace;font-size:12px}
.log-line{padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03);line-height:1.5}
.log-line .time{color:#333;margin-right:8px}
.log-line.err .msg{color:var(--red)}
.log-line.ok .msg{color:var(--green)}
.log-line.info .msg{color:#94a3b8}
.empty-log{color:var(--text2);text-align:center;padding:40px;font-size:13px}

/* Saved hint */
.saved-hint{font-size:11px;color:var(--green);margin-top:4px}

@media(max-width:700px){
  .layout{flex-direction:column;height:auto}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border)}
  .log-panel{height:400px}
}
</style>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR: Add task + queue -->
  <div class="sidebar">
    <div class="header">
      <h1>🎬 KDrama Uploader</h1>
      <div class="sub">m3u8 → Subtitle Burn → Telegram</div>
    </div>

    <!-- Add Task Form -->
    <div class="card">
      <div class="card-title">➕ নতুন Task</div>

      <div class="field">
        <label>m3u8 URL *</label>
        <input type="text" id="m3u8Url" placeholder="https://cdn.example.com/ep01.m3u8">
      </div>

      <div class="field">
        <label>Subtitle (.ass / .srt)</label>
        <div class="file-drop" id="subDrop" onclick="document.getElementById('subFile').click()">
          📄 Subtitle file drag করো বা tap করো
          <input type="file" id="subFile" accept=".ass,.srt" onchange="handleSub(this)">
          <div class="file-name" id="subName"></div>
        </div>
      </div>

      <div class="field">
        <label>Title</label>
        <input type="text" id="title" placeholder="My Love From The Star EP 01">
      </div>

      <div class="field">
        <label>Caption / Hashtag</label>
        <textarea id="caption" placeholder="#kdrama #বাংলা_সাব"></textarea>
      </div>

      <!-- Subtitle Settings -->
      <div class="field" id="subSettings" style="display:none">
        <label>🎨 Subtitle Settings</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px">
          <div>
            <div style="font-size:11px;color:#aaa;margin-bottom:4px">Font Size</div>
            <select id="subFontSize" style="width:100%;background:#1a1a2e;color:#fff;border:1px solid #333;border-radius:8px;padding:8px">
              <option value="18">Small (18)</option>
              <option value="22" selected>Medium (22)</option>
              <option value="28">Large (28)</option>
              <option value="34">XLarge (34)</option>
            </select>
          </div>
          <div>
            <div style="font-size:11px;color:#aaa;margin-bottom:4px">Color</div>
            <select id="subColor" style="width:100%;background:#1a1a2e;color:#fff;border:1px solid #333;border-radius:8px;padding:8px">
              <option value="white" selected>White</option>
              <option value="yellow">Yellow</option>
              <option value="cyan">Cyan</option>
            </select>
          </div>
          <div>
            <div style="font-size:11px;color:#aaa;margin-bottom:4px">Background</div>
            <select id="subBg" style="width:100%;background:#1a1a2e;color:#fff;border:1px solid #333;border-radius:8px;padding:8px">
              <option value="semi" selected>Semi-transparent</option>
              <option value="black">Solid Black</option>
              <option value="none">None</option>
            </select>
          </div>
          <div>
            <div style="font-size:11px;color:#aaa;margin-bottom:4px">Position</div>
            <select id="subPosition" style="width:100%;background:#1a1a2e;color:#fff;border:1px solid #333;border-radius:8px;padding:8px">
              <option value="bottom" selected>Bottom</option>
              <option value="middle">Middle</option>
              <option value="top">Top</option>
            </select>
          </div>
        </div>
        <div style="display:flex;gap:12px;margin-top:8px">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="subBold"> Bold
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="subItalic"> Italic
          </label>
        </div>
      </div>

      <div class="toggle-row">
        <span>Compress (720p, ছোট size)</span>
        <button class="toggle" id="compressToggle" onclick="this.classList.toggle('on')"></button>
      </div>
    </div>

    <!-- Telegram Credentials -->
    <div class="card">
      <div class="card-title">📲 Telegram</div>
      <div class="field">
        <label>API ID *</label>
        <input type="text" id="apiId" placeholder="12345678" oninput="saveCreds()">
      </div>
      <div class="field">
        <label>API Hash *</label>
        <input type="password" id="apiHash" placeholder="abcdef1234..." oninput="saveCreds()">
      </div>
      <div class="field">
        <label>Phone Number * (+880...)</label>
        <input type="text" id="phone" placeholder="+8801XXXXXXXXX" oninput="saveCreds()">
      </div>
      <div class="field">
        <label>Channel Username * (@channel বা -100ID)</label>
        <input type="text" id="channelUsername" placeholder="@mychannel" oninput="saveCreds()">
      </div>
      <div class="saved-hint" id="savedHint"></div>
    </div>

    <button class="btn btn-primary" id="addBtn" onclick="addTask()">➕ Queue-এ যোগ করো</button>

    <!-- Queue List -->
    <div style="margin-top:20px">
      <div class="queue-header">
        <div class="queue-title">Queue</div>
        <div class="queue-count" id="queueCount">0</div>
      </div>
      <div id="queueList"><div class="empty-log">Queue খালি</div></div>
    </div>
  </div>

  <!-- MAIN: Live Log -->
  <div class="main">
    <div class="log-panel">
      <div class="log-header">
        <div>
          <div class="log-title" id="logTitle">Live Log</div>
          <div class="log-sub" id="logSub">Task select করো</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite" id="sseIndicator"></div>
          <span style="font-size:11px;color:var(--text2)" id="sseStatus">Connecting...</span>
        </div>
      </div>
      <div class="log-box" id="logBox">
        <div class="empty-log">👈 Queue থেকে task select করো log দেখতে</div>
      </div>
    </div>
  </div>

</div>

<style>
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>

<script>
let selectedTaskId = null;
let queue = [];
let es = null;

// ===== Load creds =====
window.onload = () => {
  ['apiId','apiHash','phone','channelUsername'].forEach(k => {
    const v = localStorage.getItem('tg_'+k);
    if (v) document.getElementById(k).value = v;
  });
  if (localStorage.getItem('tg_apiId')) document.getElementById('savedHint').textContent = '✓ Saved credentials loaded';
  connectSSE();
};

function saveCreds() {
  ['apiId','apiHash','phone','channelUsername'].forEach(k => {
    const v = document.getElementById(k).value.trim();
    if (v) localStorage.setItem('tg_'+k, v);
  });
}

// ===== SSE =====
function connectSSE() {
  if (es) es.close();
  es = new EventSource('/api/stream');

  es.onopen = () => {
    document.getElementById('sseStatus').textContent = 'Connected';
    document.getElementById('sseIndicator').style.background = 'var(--green)';
  };

  es.onerror = () => {
    document.getElementById('sseStatus').textContent = 'Reconnecting...';
    document.getElementById('sseIndicator').style.background = 'var(--red)';
    setTimeout(connectSSE, 3000);
  };

  es.onmessage = e => {
    const data = JSON.parse(e.data);

    if (data.type === 'init') {
      queue = data.queue;
      renderQueue();
    } else if (data.type === 'added') {
      queue.push(data.task);
      renderQueue();
    } else if (data.type === 'removed') {
      queue = queue.filter(t => t.id !== data.taskId);
      renderQueue();
    } else if (data.type === 'status') {
      const task = queue.find(t => t.id === data.taskId);
      if (task) {
        task.status = data.status;
        if (data.progress !== undefined) task.progress = data.progress;
        if (data.error) task.error = data.error;
        renderQueue();
      }
    } else if (data.type === 'log') {
      const task = queue.find(t => t.id === data.taskId);
      if (task) {
        if (!task.logs) task.logs = [];
        task.logs.push({ time: data.time, msg: data.msg, level: data.level });
        if (selectedTaskId === data.taskId) appendLog(data);
      }
    }
  };
}

// ===== Drag drop subtitle =====
const subDrop = document.getElementById('subDrop');
subDrop.addEventListener('dragover', e => { e.preventDefault(); subDrop.classList.add('over'); });
subDrop.addEventListener('dragleave', () => subDrop.classList.remove('over'));
subDrop.addEventListener('drop', e => {
  e.preventDefault(); subDrop.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) { document.getElementById('subName').textContent = '✓ ' + f.name; subDrop._file = f; }
});

function handleSub(input) {
  document.getElementById('subSettings').style.display = input.files[0] ? 'block' : 'none';
  if (input.files[0]) {
    document.getElementById('subName').textContent = '✓ ' + input.files[0].name;
    subDrop._file = input.files[0];
  }
}

// ===== Add task =====
async function addTask() {
  const m3u8Url = document.getElementById('m3u8Url').value.trim();
  const apiId = document.getElementById('apiId').value.trim();
  const apiHash = document.getElementById('apiHash').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const channelUsername = document.getElementById('channelUsername').value.trim();

  if (!m3u8Url) { alert('m3u8 URL দাও!'); return; }
  if (!apiId || !apiHash || !phone) { alert('Telegram credentials দাও!'); return; }
  if (!channelUsername) { alert('Channel username দাও!'); return; }

  const btn = document.getElementById('addBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Adding...';

  try {
    const fd = new FormData();
    fd.append('m3u8Url', m3u8Url);
    fd.append('title', document.getElementById('title').value.trim());
    fd.append('caption', document.getElementById('caption').value.trim());
    fd.append('apiId', apiId);
    fd.append('apiHash', apiHash);
    fd.append('phone', phone);
    fd.append('channelUsername', channelUsername);
    fd.append('compress', document.getElementById('compressToggle').classList.contains('on'));
    fd.append('subFontSize', document.getElementById('subFontSize').value);
    fd.append('subColor', document.getElementById('subColor').value);
    fd.append('subBg', document.getElementById('subBg').value);
    fd.append('subPosition', document.getElementById('subPosition').value);
    fd.append('subBold', document.getElementById('subBold').checked);
    fd.append('subItalic', document.getElementById('subItalic').checked);
    if (subDrop._file) fd.append('subtitle', subDrop._file, subDrop._file.name);

    const r = await fetch('/api/queue/add', { method: 'POST', body: fd });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);

    // Clear form
    document.getElementById('m3u8Url').value = '';
    document.getElementById('title').value = '';
    document.getElementById('caption').value = '';
    document.getElementById('subName').textContent = '';
    subDrop._file = null;
    document.getElementById('subFile').value = '';

  } catch (e) {
    alert('❌ ' + e.message);
  }

  btn.disabled = false;
  btn.textContent = '➕ Queue-এ যোগ করো';
}

// ===== Queue render =====
function renderQueue() {
  const list = document.getElementById('queueList');
  document.getElementById('queueCount').textContent = queue.length;

  if (!queue.length) {
    list.innerHTML = '<div class="empty-log">Queue খালি</div>';
    return;
  }

  list.innerHTML = queue.map(t => `
    <div class="task-card ${selectedTaskId === t.id ? 'active' : ''}" onclick="selectTask('${t.id}')">
      <div class="task-header">
        <div class="task-title">${t.title || 'Episode'}</div>
        <span class="badge ${t.status}">${statusLabel(t.status)}</span>
      </div>
      <div class="task-bar-bg"><div class="task-bar" style="width:${t.progress||0}%"></div></div>
      <div class="task-meta">${t.progress||0}% • ${t.compress?'720p':'Original'} • ${timeAgo(t.createdAt)}</div>
      ${t.error ? `<div style="font-size:11px;color:var(--red);margin-top:4px">❌ ${t.error}</div>` : ''}
      <div class="task-actions">
        ${t.status === 'error' ? `<button class="btn-sm btn-yellow" onclick="retry(event,'${t.id}')">🔄 Retry</button>` : ''}
        ${t.status !== 'processing' ? `<button class="btn-sm btn-red" onclick="removeTask(event,'${t.id}')">🗑 Remove</button>` : ''}
      </div>
    </div>
  `).join('');
}

function statusLabel(s) {
  return { pending:'⏳ Pending', processing:'⚡ Processing', done:'✅ Done', error:'❌ Error' }[s] || s;
}

function timeAgo(iso) {
  const d = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (d < 60) return d + 's ago';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  return Math.floor(d/3600) + 'h ago';
}

// ===== Select task =====
function selectTask(id) {
  selectedTaskId = id;
  renderQueue();
  const task = queue.find(t => t.id === id);
  if (!task) return;

  document.getElementById('logTitle').textContent = task.title || 'Episode';
  document.getElementById('logSub').textContent = statusLabel(task.status) + ' • ' + (task.progress||0) + '%';

  const box = document.getElementById('logBox');
  box.innerHTML = '';
  (task.logs || []).forEach(l => appendLog(l));
  box.scrollTop = box.scrollHeight;
}

function appendLog(entry) {
  if (selectedTaskId !== entry.taskId && entry.taskId) return;
  const box = document.getElementById('logBox');
  const line = document.createElement('div');
  line.className = 'log-line ' + (entry.level || 'info');
  const t = new Date(entry.time).toLocaleTimeString('bn-BD');
  line.innerHTML = `<span class="time">${t}</span><span class="msg">${entry.msg}</span>`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;

  // Update subtitle
  const task = queue.find(t => t.id === selectedTaskId);
  if (task) document.getElementById('logSub').textContent = statusLabel(task.status) + ' • ' + (task.progress||0) + '%';
}

// ===== Actions =====
async function retry(e, id) {
  e.stopPropagation();
  await fetch(`/api/queue/${id}/retry`, { method: 'POST' });
}

async function removeTask(e, id) {
  e.stopPropagation();
  await fetch(`/api/queue/${id}`, { method: 'DELETE' });
}
</script>
</body>
</html>
